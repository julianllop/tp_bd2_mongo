version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: mediDoc-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mediDoc
    volumes:
      - medidoc_data:/data/db
    networks:
      - medidoc-network

volumes:
  medidoc_data:

networks:
  medidoc-network:
    driver: bridge
